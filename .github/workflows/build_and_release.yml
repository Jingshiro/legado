name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Version Name
        id: version
        run: |
          VERSION=$(date -d "8 hour" -u +3.%y.%m%d%H)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Clear 18PlusList.txt
        run: |
          echo "" > app/src/main/assets/18PlusList.txt

      - name: Configure Keystore
        run: |
          cp .github/workflows/legado.jks app/legado.jks
          cat >> gradle.properties << EOF
          RELEASE_STORE_FILE=./legado.jks
          RELEASE_KEY_ALIAS=legado
          RELEASE_STORE_PASSWORD=gedoor_legado
          RELEASE_KEY_PASSWORD=gedoor_legado
          EOF

      - name: Build Beta Package
        run: |
          sed "/def version/c def version = \"${{ env.VERSION }}\"" app/build.gradle -i
          chmod +x gradlew
          ./gradlew assembleAppRelease --build-cache --parallel --daemon --warning-mode all
          mkdir -p apk_output
          find app/build/outputs/apk -name "*.apk" -exec mv {} apk_output/legado_release_${{ env.VERSION }}.apk \;

      - name: Build Formal Release Package
        run: |
          sed "s/applicationIdSuffix '.release'/applicationIdSuffix '.releaseS'/" app/build.gradle -i
          ./gradlew assembleAppRelease --build-cache --parallel --daemon --warning-mode all
          find app/build/outputs/apk -name "*.apk" -exec mv {} apk_output/legado_releaseS_${{ env.VERSION }}.apk \;

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Legado ${{ env.VERSION }}
          files: apk_output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to Gitee
        uses: Yikun/hub-mirror-action@v1.5
        with:
          src: github/${{ github.repository_owner }}
          dst: gitee/mirror-233
          dst_key: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          account_type: user
          static_list: "legado"
          force_update: true

      - name: Create Gitee Release & Upload Assets
        run: |
          TAG="${{ env.VERSION }}"
          REPO="mirror-233/legado"
          TOKEN="${{ secrets.GITEE_TOKEN }}"
          
          # 1. 优雅地用 jq 查 Release ID
          echo "Checking if release for tag $TAG already exists..."
          EXISTING_RES=$(curl -s "https://gitee.com/api/v5/repos/$REPO/releases/tags/$TAG?access_token=$TOKEN")
          RELEASE_ID=$(echo "$EXISTING_RES" | jq -r '.id // empty')

          if [ -n "$RELEASE_ID" ]; then
            echo "Release 已存在，ID: $RELEASE_ID，直接复用。"
          else
            echo "Release 不存在，准备创建..."
            # Tag 在上一步 mirror 已经过去，直接建 Release
            CREATE_RES=$(curl -s -X POST "https://gitee.com/api/v5/repos/$REPO/releases" \
              -H "Content-Type: application/json" \
              -d "{\"access_token\":\"$TOKEN\",\"tag_name\":\"$TAG\",\"name\":\"Legado $TAG\",\"body\":\"由 GitHub Actions 自动构建并发布\"}")
            
            RELEASE_ID=$(echo "$CREATE_RES" | jq -r '.id // empty')
            if [ -z "$RELEASE_ID" ]; then
              echo "::error::Release 创建失败！Gitee 报错: $CREATE_RES"
              exit 1
            fi
            echo "创建成功，Release ID: $RELEASE_ID"
          fi

          # 2. 直接传 APK，带重试机制和状态码阻断
          for file in apk_output/*.apk; do
            FILESIZE=$(du -h "$file" | cut -f1)
            echo "Uploading $file ($FILESIZE) to Gitee..."
            
            # 使用 -w 抓取 HTTP 状态码，失败直接中断脚本
            UPLOAD_HTTP=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --max-time 600 \
              "https://gitee.com/api/v5/repos/$REPO/releases/$RELEASE_ID/attach_files" \
              -F "access_token=$TOKEN" \
              -F "file=@$file")
              
            if [ "$UPLOAD_HTTP" = "201" ]; then
              echo "✅ $file 上传成功！"
            else
              echo "::error::❌ $file 上传失败！HTTP 状态码: $UPLOAD_HTTP"
              exit 1
            fi
          done
