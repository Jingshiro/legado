name: Release Build

on:
  push:
    branches:
      - main
    paths:
      - "**"
      - "!**.md"
      - "!**/ISSUE_TEMPLATE/**"
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.repository_owner == 'Jingshiro'
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
    steps:
      - id: set-ver
        run: |
          # 增加分钟 (mm) 以避免同小时多次推送导致的标签冲突
          echo "version=$(date -d "8 hour" -u +3.%y.%m%d%H%M)" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      matrix:
        product: [app]
        type: [release, releaseS]
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      product: ${{ matrix.product }}
      type: ${{ matrix.type }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Clear 18PlusList.txt
        run: |
          echo "清空18PlusList.txt"
          echo "">$GITHUB_WORKSPACE/app/src/main/assets/18PlusList.txt

      - name: Release Apk Sign
        run: |
          echo -e "\n" >> gradle.properties
          echo RELEASE_KEY_ALIAS='legado' >> gradle.properties
          echo RELEASE_KEY_PASSWORD='gedoor_legado' >> gradle.properties
          echo RELEASE_STORE_PASSWORD='gedoor_legado' >> gradle.properties
          # 确保脚本对你的仓库环境通用
          cp $GITHUB_WORKSPACE/.github/workflows/legado.jks $GITHUB_WORKSPACE/app/legado.jks
          echo RELEASE_STORE_FILE='./legado.jks' >> gradle.properties

      - name: Build With Gradle
        run: |
          if [ "${{ env.type }}" == 'release' ]; then
            typeName="标准版"
          else
            typeName="Beta版"
            sed "s/'.release'/'.releaseS'/" $GITHUB_WORKSPACE/app/build.gradle  -i
          fi
          echo "统一版本号"
          sed "/def version/c def version = \"${{ env.VERSION }}\"" $GITHUB_WORKSPACE/app/build.gradle  -i
          echo "开始${{ env.product }}$typeName构建"
          chmod +x gradlew
          ./gradlew assemble${{ env.product }}release --build-cache --parallel --daemon --warning-mode all

      - name: Organize the Files
        run: |
          if [ "${{ env.type }}" == 'release' ]; then
            typeName=""
          else
            typeName="_beta"
          fi
          mkdir -p ${{ github.workspace }}/apk/
          # 清理历史残留
          rm -f ${{ github.workspace }}/apk/*.apk
          # 拷贝所有 apk
          find ${{ github.workspace }}/app/build/outputs/apk/ -name "*.apk" -exec cp {} ${{ github.workspace }}/apk/ \;

          # 进入目录进行批量重命名
          cd ${{ github.workspace }}/apk/
          for file in *.apk; do
             # 生成新文件名：前缀 + 原文件名
             new_name="legado_app_${{ env.VERSION }}${typeName}_${file}"
             # 如果文件名还没被改过（防止重复运行时的冲突）
             if [ "$file" != "$new_name" ]; then
                mv "$file" "$new_name"
             fi
          done

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado_${{ env.product }}_${{ env.type }}
          path: ${{ github.workspace }}/apk/*.apk

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: apks/
      
      - name: Flatten apks
        run: |
          mkdir -p final_apks/
          find apks/ -name "*.apk" -exec mv {} final_apks/ \;

      - name: Create Official Release
        uses: softprops/action-gh-release@v2
        with:
          name: legado_app_${{ needs.prepare.outputs.version }}
          tag_name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: final_apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
